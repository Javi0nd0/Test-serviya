<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiYa — Servicios de confianza</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --blue:#1E3A8A;--blue-mid:#2563EB;--blue-light:#EFF6FF;--blue-xlight:#F8FAFF;
  --green:#059669;--green-light:#ECFDF5;--green-mid:#10B981;
  --indigo:#4338CA;--amber:#D97706;--amber-light:#FFFBEB;
  --red:#DC2626;--red-light:#FEF2F2;
  --slate:#0F172A;--slate2:#1E293B;--slate3:#334155;
  --gray:#64748B;--gray2:#94A3B8;--gray3:#CBD5E1;--gray4:#E2E8F0;--gray5:#F1F5F9;--gray6:#F8FAFC;
  --white:#FFFFFF;
  --r:12px;--rl:18px;--rxl:24px;
  --s1:0 1px 3px rgba(0,0,0,.08);--s2:0 4px 16px rgba(0,0,0,.08);--s3:0 20px 60px rgba(0,0,0,.12);
  --sb:0 8px 32px rgba(37,99,235,.28);--sg:0 8px 32px rgba(5,150,105,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--slate);overflow-x:hidden;}
h1,h2,h3,h4,h5{font-family:'Sora',sans-serif;}
.page{display:none;min-height:100vh;}
.page.active{display:block;}
nav{position:fixed;top:0;left:0;right:0;z-index:900;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--gray4);display:flex;align-items:center;padding:0 32px;gap:0;}
.nav-logo{font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:900;color:var(--slate);cursor:pointer;display:flex;align-items:center;gap:6px;margin-right:32px;}
.nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-mid);}
.nav-links{display:flex;gap:2px;flex:1;}
.nl{padding:8px 14px;border-radius:8px;font-size:.84rem;font-weight:500;color:var(--gray);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all .18s;}
.nl:hover,.nl.active{color:var(--slate);background:var(--gray5);}
.nav-right{display:flex;align-items:center;gap:8px;}
.btn-login{padding:9px 18px;border-radius:8px;font-size:.84rem;font-weight:600;color:var(--slate);background:none;border:1.5px solid var(--gray4);cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;}
.btn-login:hover{border-color:var(--blue-mid);color:var(--blue-mid);}
.btn-cta-nav{padding:9px 20px;border-radius:8px;font-size:.84rem;font-weight:700;color:var(--white);background:var(--blue-mid);border:none;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;box-shadow:var(--sb);}
.btn-cta-nav:hover{background:var(--blue);transform:translateY(-1px);}
.nav-ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue-mid),var(--indigo));color:#fff;font-size:.75rem;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.nav-ava-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1px solid var(--gray4);border-radius:var(--r);padding:6px;min-width:180px;box-shadow:var(--s3);display:none;z-index:1000;}
.nav-ava-menu.open{display:block;}
.nam-item{padding:9px 12px;border-radius:8px;font-size:.81rem;cursor:pointer;color:var(--slate);transition:background .15s;display:flex;align-items:center;gap:8px;}
.nam-item:hover{background:var(--gray5);}
.nam-divider{height:1px;background:var(--gray4);margin:4px 0;}
#page-home{background:var(--white);padding-top:64px;}
.hero{padding:72px 64px 80px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;min-height:calc(100vh - 64px);}
.hero-left{opacity:0;transform:translateY(28px);transition:all .7s cubic-bezier(.22,1,.36,1);}
.hero-left.in{opacity:1;transform:translateY(0);}
.hero-tag{display:inline-flex;align-items:center;gap:7px;background:var(--blue-light);border:1px solid #BFDBFE;color:var(--blue-mid);font-size:.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 12px;border-radius:50px;margin-bottom:24px;}
.dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--green-mid);animation:dp 1.5s infinite;}
@keyframes dp{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
.hero-h1{font-size:clamp(2.6rem,4.5vw,3.8rem);font-weight:900;letter-spacing:-2px;line-height:1.02;color:var(--slate);margin-bottom:20px;}
.hero-h1 .accent{color:var(--blue-mid);}
.hero-sub{font-size:1rem;color:var(--gray);line-height:1.75;margin-bottom:32px;max-width:500px;}
.hero-sub strong{color:var(--slate);font-weight:600;}
.cta-block{margin-bottom:28px;display:flex;gap:12px;flex-wrap:wrap;}
.btn-hero{display:inline-flex;align-items:center;gap:10px;background:var(--blue-mid);color:var(--white);font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;padding:16px 32px;border-radius:12px;border:none;cursor:pointer;box-shadow:var(--sb);transition:all .25s;position:relative;overflow:hidden;}
.btn-hero:hover{background:var(--blue);transform:translateY(-2px);}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--slate);font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;padding:15px 28px;border-radius:12px;border:1.5px solid var(--gray4);cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--blue-mid);color:var(--blue-mid);}
.rating-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.stars{color:#F59E0B;letter-spacing:1px;}
.rating-text{font-size:.82rem;color:var(--gray);}
.rating-text strong{color:var(--slate);}
.avatar-stack{display:flex;}
.av{width:28px;height:28px;border-radius:50%;border:2px solid #fff;margin-left:-7px;font-size:.62rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;}
.av:first-child{margin-left:0;}
.trust-signals{display:flex;gap:8px;flex-wrap:wrap;}
.ts{display:flex;align-items:center;gap:6px;font-size:.76rem;font-weight:600;padding:6px 12px;border-radius:50px;border:1px solid;}
.ts.green{background:var(--green-light);border-color:#A7F3D0;color:var(--green);}
.ts.blue{background:var(--blue-light);border-color:#BFDBFE;color:var(--blue-mid);}
.ts.gray{background:var(--gray5);border-color:var(--gray4);color:var(--gray);}
.hero-right{opacity:0;transform:translateX(28px);transition:all .7s .15s cubic-bezier(.22,1,.36,1);position:relative;}
.hero-right.in{opacity:1;transform:translateX(0);}
.illus-wrap{background:linear-gradient(145deg,var(--blue-xlight),var(--green-light));border-radius:var(--rxl);padding:28px;border:1px solid var(--gray4);box-shadow:var(--s3);position:relative;}
.fcard{position:absolute;background:var(--white);border-radius:14px;padding:11px 15px;box-shadow:var(--s3);border:1px solid var(--gray4);display:flex;align-items:center;gap:9px;animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.fcard-1{top:-14px;left:-18px;}
.fcard-2{bottom:10px;right:-18px;animation-delay:1.8s;}
.fcard-text strong{display:block;font-size:.8rem;font-weight:700;color:var(--slate);}
.fcard-text span{font-size:.68rem;color:var(--gray);}
.fcard-badge{background:var(--green-light);color:var(--green);font-size:.66rem;font-weight:700;padding:1px 7px;border-radius:50px;margin-top:2px;display:inline-block;}
.search-widget{background:var(--white);border-radius:var(--rl);padding:18px;border:1px solid var(--gray4);box-shadow:var(--s2);margin-top:14px;}
.sw-tabs{display:flex;gap:4px;background:var(--gray5);border-radius:8px;padding:3px;margin-bottom:14px;}
.sw-tab{flex:1;padding:7px;border-radius:6px;border:none;font-family:'Inter',sans-serif;font-size:.77rem;font-weight:600;cursor:pointer;transition:all .18s;background:transparent;color:var(--gray);}
.sw-tab.active{background:var(--white);color:var(--slate);box-shadow:var(--s1);}
.sw-search{display:flex;gap:7px;}
.sw-input{flex:1;background:var(--gray5);border:1.5px solid transparent;border-radius:9px;padding:10px 13px;font-family:'Inter',sans-serif;font-size:.83rem;outline:none;transition:border-color .18s;}
.sw-input:focus{border-color:var(--blue-mid);background:var(--white);}
.sw-btn{background:var(--blue-mid);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-family:'Sora',sans-serif;font-weight:700;font-size:.83rem;cursor:pointer;}
.sw-cats{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.sw-cat{padding:4px 11px;background:var(--gray5);border:1.5px solid var(--gray4);border-radius:50px;font-size:.71rem;font-weight:600;color:var(--gray);cursor:pointer;transition:all .18s;}
.sw-cat:hover{border-color:var(--blue-mid);color:var(--blue-mid);background:var(--blue-light);}
.stats{background:var(--slate);padding:44px 64px;}
.stats-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:0;}
.stat-item{text-align:center;padding:0 16px;border-right:1px solid rgba(255,255,255,.08);}
.stat-item:last-child{border-right:none;}
.stat-n{font-family:'Sora',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;letter-spacing:-1px;}
.stat-l{font-size:.73rem;color:rgba(255,255,255,.4);margin-top:4px;}
.stat-change{font-size:.67rem;color:var(--green-mid);font-weight:600;margin-top:3px;}
.trust-sec{background:var(--gray6);border-top:1px solid var(--gray4);border-bottom:1px solid var(--gray4);padding:30px 64px;}
.trust-sec-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.trust-item{display:flex;align-items:center;gap:11px;}
.trust-icon-wrap{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.ti-blue{background:var(--blue-light);}
.ti-green{background:var(--green-light);}
.ti-amber{background:var(--amber-light);}
.ti-slate{background:var(--gray5);}
.trust-item-text strong{display:block;font-size:.82rem;font-weight:700;color:var(--slate);}
.trust-item-text span{font-size:.72rem;color:var(--gray);}
.trust-divider{width:1px;height:38px;background:var(--gray4);}
.sec{padding:80px 64px;max-width:1200px;margin:0 auto;}
.sec-eye{font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue-mid);margin-bottom:8px;}
.sec-title{font-size:clamp(1.8rem,3vw,2.4rem);font-weight:900;letter-spacing:-1px;color:var(--slate);margin-bottom:10px;}
.sec-sub{font-size:.88rem;color:var(--gray);max-width:480px;line-height:1.7;}
.sec-header{margin-bottom:48px;}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.step{background:var(--white);border-radius:var(--rl);padding:26px;border:1px solid var(--gray4);position:relative;overflow:hidden;transition:all .3s;cursor:default;}
.step::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.step:nth-child(1)::before{background:var(--blue-mid);}
.step:nth-child(2)::before{background:var(--green);}
.step:nth-child(3)::before{background:var(--amber);}
.step:hover{box-shadow:var(--s3);transform:translateY(-4px);}
.step:hover::before{transform:scaleX(1);}
.step-n{font-size:.65rem;font-weight:800;letter-spacing:1px;color:var(--gray2);margin-bottom:12px;}
.step-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:12px;}
.ico-b{background:var(--blue-light);}
.ico-g{background:var(--green-light);}
.ico-a{background:var(--amber-light);}
.step h3{font-size:.92rem;font-weight:700;color:var(--slate);margin-bottom:7px;}
.step p{font-size:.8rem;color:var(--gray);line-height:1.65;}
.cats-sec{background:var(--gray6);border-top:1px solid var(--gray4);}
.cats-inner{max-width:1200px;margin:0 auto;padding:72px 64px;}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px;margin-top:40px;}
.cat-p{background:var(--white);border-radius:var(--r);padding:14px 8px;text-align:center;cursor:pointer;transition:all .22s;border:1.5px solid var(--gray4);}
.cat-p:hover{background:var(--blue-light);border-color:var(--blue-mid);}
.cat-p .ci{font-size:1.5rem;display:block;margin-bottom:6px;}
.cat-p .cn{font-size:.7rem;font-weight:700;color:var(--slate);}
.cat-p .cc{font-size:.62rem;color:var(--gray2);margin-top:1px;}
.test-sec{padding:80px 64px;}
.test-sec-inner{max-width:1200px;margin:0 auto;}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px;}
.test-card{background:var(--gray6);border-radius:var(--rl);padding:26px;border:1px solid var(--gray4);}
.test-stars{color:#F59E0B;font-size:.9rem;margin-bottom:12px;}
.test-text{font-size:.855rem;color:var(--slate);line-height:1.7;margin-bottom:18px;font-style:italic;}
.test-author{display:flex;align-items:center;gap:10px;}
.test-ava{width:38px;height:38px;border-radius:50%;font-size:.95rem;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;}
.test-info strong{display:block;font-size:.82rem;font-weight:700;color:var(--slate);}
.test-info span{font-size:.7rem;color:var(--gray);}
.test-tag{display:inline-block;font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:50px;background:var(--green-light);color:var(--green);margin-top:3px;}
footer{background:var(--slate);padding:52px 64px 32px;}
.footer-inner{max-width:1200px;margin:0 auto;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px;}
.footer-logo{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:900;color:#fff;margin-bottom:10px;}
.footer-desc{color:rgba(255,255,255,.36);font-size:.76rem;line-height:1.75;max-width:230px;}
.footer-col-title{font-size:.6rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:12px;}
.footer-link{display:block;color:rgba(255,255,255,.42);font-size:.76rem;margin-bottom:8px;cursor:pointer;transition:color .15s;}
.footer-link:hover{color:#fff;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.footer-copy{color:rgba(255,255,255,.22);font-size:.7rem;}
#page-buscar{padding-top:64px;background:var(--gray6);}
.buscar-top{background:var(--white);border-bottom:1px solid var(--gray4);padding:22px 40px;}
.bt-inner{max-width:1200px;margin:0 auto;}
.bt-inner h1{font-size:1.3rem;font-weight:800;letter-spacing:-.4px;margin-bottom:16px;}
.filtros{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.fw{position:relative;}
.fsel{background:var(--gray6);border:1.5px solid var(--gray4);border-radius:9px;padding:9px 32px 9px 13px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;color:var(--slate);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;min-width:130px;}
.fsel:focus{border-color:var(--blue-mid);}
.fa{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--gray2);font-size:.62rem;}
.mode-btns{display:flex;gap:4px;}
.mfb{padding:9px 15px;border-radius:9px;border:1.5px solid var(--gray4);background:var(--white);color:var(--gray);font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .18s;}
.mfb.mu{background:var(--red-light);border-color:#FCA5A5;color:var(--red);}
.mfb.ms{background:var(--green-light);border-color:#6EE7B7;color:var(--green);}
.active-tags{display:none;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.active-tags.show{display:flex;}
.atag{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue-mid);padding:3px 9px;border-radius:50px;font-size:.71rem;font-weight:700;}
.atag button{background:none;border:none;cursor:pointer;color:var(--blue-mid);font-size:.78rem;}
.rc{font-size:.77rem;color:var(--gray);margin-top:9px;}
.rc strong{color:var(--slate);}
.scdd{background:var(--white);border:1px solid var(--gray4);border-radius:var(--r);padding:5px;position:absolute;top:calc(100% + 5px);left:0;min-width:195px;z-index:200;box-shadow:var(--s3);display:none;}
.scdd.open{display:block;}
.sci{padding:7px 11px;border-radius:7px;font-size:.8rem;cursor:pointer;transition:background .13s;color:var(--slate);}
.sci:hover{background:var(--gray5);}
.sci.sel{background:var(--blue-light);color:var(--blue-mid);font-weight:600;}
.bb{max-width:1200px;margin:0 auto;padding:24px 40px;}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
.pcard{background:var(--white);border-radius:var(--rl);border:1px solid var(--gray4);overflow:hidden;cursor:pointer;transition:all .3s;position:relative;}
.pcard:hover{box-shadow:var(--s3);border-color:transparent;transform:translateY(-3px);}
.pcard-ft{border-color:var(--blue-mid);}
.ft-b{position:absolute;top:10px;right:10px;background:var(--blue-mid);color:#fff;font-size:.64rem;font-weight:700;padding:2px 8px;border-radius:50px;z-index:1;}
.pc-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,var(--gray6),var(--gray5));}
.pc-body{padding:16px;}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.pc-name{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;color:var(--slate);}
.pc-rating{display:flex;align-items:center;gap:3px;font-size:.76rem;}
.pc-rating .s{color:#F59E0B;}
.pc-rating .n{font-weight:700;color:var(--slate);}
.pc-rating .c{color:var(--gray2);}
.pc-cat{font-size:.7rem;color:var(--blue-mid);font-weight:600;margin-bottom:7px;}
.pc-ver{display:inline-flex;align-items:center;gap:3px;background:var(--green-light);color:var(--green);font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:50px;margin-bottom:8px;}
.pc-desc{font-size:.77rem;color:var(--gray);line-height:1.55;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-meta{font-size:.71rem;color:var(--gray);margin-bottom:12px;}
.pc-ftr{display:flex;gap:6px;}
.btn-ver2{flex:1;padding:8px;border-radius:8px;background:var(--gray5);color:var(--slate);font-weight:600;font-size:.76rem;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-sol2{flex:2;padding:8px;border-radius:8px;background:var(--blue-mid);color:#fff;font-weight:700;font-size:.76rem;border:none;cursor:pointer;font-family:'Sora',sans-serif;}
#page-perfil{padding-top:64px;background:var(--gray6);}
.ph{background:var(--white);border-bottom:1px solid var(--gray4);padding:36px 40px 0;}
.ph-inner{max-width:940px;margin:0 auto;}
.ph-row{display:flex;gap:20px;align-items:flex-start;margin-bottom:22px;}
.ph-ava{width:76px;height:76px;border-radius:15px;background:linear-gradient(135deg,var(--blue-mid),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
.ph-name{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:-.5px;color:var(--slate);margin-bottom:6px;}
.ph-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.pbg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:50px;font-size:.66rem;font-weight:700;}
.pbg-v{background:var(--green-light);color:var(--green);}
.pbg-f{background:var(--amber-light);color:var(--amber);}
.pbg-c{background:var(--blue-light);color:var(--blue-mid);}
.ph-cats-row{display:flex;gap:5px;flex-wrap:wrap;}
.pct{background:var(--gray5);color:var(--slate);padding:2px 9px;border-radius:50px;font-size:.7rem;font-weight:600;}
.ph-tabs{display:flex;border-top:1px solid var(--gray4);margin-top:14px;}
.ph-tab{padding:12px 18px;font-size:.8rem;font-weight:600;color:var(--gray);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;font-family:'Inter',sans-serif;}
.ph-tab.active{color:var(--blue-mid);border-bottom-color:var(--blue-mid);}
.pb{max-width:940px;margin:0 auto;padding:28px 40px;display:grid;grid-template-columns:1fr 280px;gap:20px;}
